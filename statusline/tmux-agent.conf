set -g status 3
set -g status-position bottom
set -g status-interval 10
set -g status-justify left
set -g status-style "fg=#c0caf5,bg=#1a1b26"
set -g status-left ""
set -g status-right ""
set -g status-left-length 0
set -g status-right-length 0
set -g message-style "fg=#1a1b26,bg=#e0af68,bold"
set -g mode-style "fg=#1a1b26,bg=#7dcfff,bold"
set -ga terminal-features ",xterm-kitty:RGB"
set -g status-format[0] "#(@STATUS_COMMAND@ 1 @AGENT@ #{pane_id})"
set -g status-format[1] "#(@STATUS_COMMAND@ 2 @AGENT@ #{pane_id})"
set -g status-format[2] "#(@STATUS_COMMAND@ 3 @AGENT@ #{pane_id})"
